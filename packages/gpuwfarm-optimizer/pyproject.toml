[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "gpuwfarm-optimizer"
version = "0.1.0"
description = "GPU genetic-algorithm optimizer for wind-farm layout and yaw (built on gpuwfarm-core)."
requires-python = ">=3.10"
dependencies = [
    "gpuwfarm-core",
    "numpy",
    "h5py",
    "hdf5plugin",
]

[project.optional-dependencies]
# Layout / convergence plotting in main.py and the benchmark script.
viz = ["matplotlib"]
# FLORIS-YAML input loading via the core loader.
floris = ["gpuwfarm-core[floris]"]

[project.scripts]
gpuwfarm-optimize = "gpuwfarm_opt.main:main"
gpuwfarm-benchmark = "gpuwfarm_opt.scripts.benchmark:main"

[tool.hatch.build.targets.wheel]
packages = ["src/gpuwfarm_opt"]

[tool.uv.sources]
gpuwfarm-core = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
